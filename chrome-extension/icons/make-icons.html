<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BrainHistory Icon Generator</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 32px; background: #f8fafc; }
    h1   { font-size: 20px; margin-bottom: 8px; }
    p    { color: #64748b; margin-bottom: 24px; }
    .row { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    button {
      padding: 8px 16px; border: none;
      background: #7c3aed; color: white;
      border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    button:hover { background: #6d28d9; }
    canvas { border-radius: 22%; border: 1px solid #e2e8f0; }
    label  { font-size: 13px; color: #334155; min-width: 60px; }
  </style>
</head>
<body>
  <h1>BrainHistory – PNG Icon Generator</h1>
  <p>
    Open this file in any browser, then click each "Download" button.<br>
    Save each file into the <code>icons/</code> folder with the exact filename shown.
  </p>
  <div id="icons-container"></div>

  <script>
    const SIZES = [16, 32, 48, 128];

    function drawIcon(size) {
      const canvas = document.createElement("canvas");
      canvas.width  = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      const r   = size * 0.22; // corner radius

      // Rounded rectangle background (violet → indigo gradient)
      const grad = ctx.createLinearGradient(0, 0, size, size);
      grad.addColorStop(0, "#7c3aed");
      grad.addColorStop(1, "#4f46e5");

      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // White letter "B" centered
      ctx.fillStyle = "rgba(255,255,255,0.95)";
      const fontSize = Math.round(size * 0.52);
      ctx.font = `700 ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
      ctx.textAlign    = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("B", size / 2, size / 2 + size * 0.03);

      return canvas;
    }

    const container = document.getElementById("icons-container");

    SIZES.forEach((size) => {
      const canvas   = drawIcon(size);
      const filename = `icon${size}.png`;

      const row = document.createElement("div");
      row.className = "row";

      const label = document.createElement("label");
      label.textContent = `${size}×${size}`;

      const btn = document.createElement("button");
      btn.textContent = `Download  ${filename}`;
      btn.onclick = () => {
        const a = document.createElement("a");
        a.download = filename;
        a.href     = canvas.toDataURL("image/png");
        a.click();
      };

      row.appendChild(canvas);
      row.appendChild(label);
      row.appendChild(btn);
      container.appendChild(row);
    });
  </script>
</body>
</html>
